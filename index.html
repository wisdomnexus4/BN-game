<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BN Games</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h1>BN Games</h1>

        <ul>
            <li><a href="#games">Games</a></li>
            <li><a href="#pricing">Pricing</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

<section id="hero">

    <div class="hero-image">
        <img src="images/bg.jpg" alt="PS5">
    </div>

    <div class="hero-content">
        <h1>BN Games</h1>

        <p>
            Experience Next-Generation Gaming.
        </p>

        <a href="#games" class="btn">
            Explore Games
        </a>

    </div>

</section>

<section id="games">

    <h2>Games</h2>

    <div class="game-container">

        <div class="game-card">
            <img src="images/gta.avif" alt="">
            <h3>GTA V</h3>
        </div>

        <div class="game-card">
            <img src="images/efootball.avif" alt="">
            <h3>Efootball</h3>
        </div>

        <div class="game-card">
            <img src="images/fortnite.avif" alt="">
            <h3>Fortnite</h3>
        </div>

    </div>

</section>

<section id="pricing">

    <h2>Pricing</h2>

    <p>Choose the plan that fits you.</p>

</section>

<section id="contact">

    <h2>Contact</h2>

    <p>Email: bn@gmail.com</p>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
